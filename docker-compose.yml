services:
  bot:
    build: .
    command: python -m app.dev
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./promts:/app/promts:ro
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./promts:/app/promts:ro
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - api
    restart: unless-stopped
